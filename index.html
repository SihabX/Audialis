<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player</title>
<style>
:root {
    --bg: #0f0f11;
    --surface: #1a1a1e;
    --surface2: #252529;
    --border: #333338;
    --text: #e8e8ed;
    --text2: #9a9aa0;
    --accent: #5b8def;
    --accent-hover: #7aa5ff;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,.4);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 30px 20px 130px; }

header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; margin-bottom: 32px;
}
h1 { font-size: 26px; font-weight: 700; letter-spacing: -.3px; }
h1 span { color: var(--accent); }
.stats { color: var(--text2); font-size: 14px; }

.view-toggle {
    display: flex; gap: 4px; background: var(--surface); border-radius: var(--radius);
    padding: 3px; border: 1px solid var(--border);
}
.view-toggle button {
    background: none; border: none; color: var(--text2); padding: 8px 18px;
    border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all .2s;
}
.view-toggle button.active { background: var(--accent); color: #fff; }
.view-toggle button:hover:not(.active) { color: var(--text); }

#gridView .track-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
}
#gridView .track-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 14px 14px; cursor: pointer; transition: all .25s;
    display: flex; flex-direction: column; align-items: center; text-align: center;
}
#gridView .track-card:hover {
    border-color: var(--accent); transform: translateY(-3px); box-shadow: var(--shadow);
}
#gridView .track-card.playing {
    border-color: var(--accent); background: var(--surface2);
}
#gridView .track-card .index {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--surface2); display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 15px;
    margin-bottom: 10px; transition: all .25s;
}
#gridView .track-card:hover .index { background: var(--accent); color: #fff; }
#gridView .track-card.playing .index { background: var(--accent); color: #fff; }
#gridView .track-card .name {
    font-size: 13px; font-weight: 500; word-break: break-word;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
#gridView .track-card .ext {
    font-size: 11px; color: var(--text2); margin-top: 6px; text-transform: uppercase;
}

#listView { display: none; }
#listView .track-list {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
}
#listView .track-item {
    display: flex; align-items: center; padding: 10px 16px;
    border-bottom: 1px solid var(--border); cursor: pointer; transition: background .2s;
    gap: 14px;
}
#listView .track-item:last-child { border-bottom: none; }
#listView .track-item:hover { background: var(--surface2); }
#listView .track-item.playing { background: var(--surface2); }
#listView .track-item .idx {
    width: 28px; text-align: right; color: var(--text2); font-size: 13px; font-weight: 500;
    flex-shrink: 0;
}
#listView .track-item .play-icon { color: var(--accent); font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
#listView .track-item .name { flex: 1; font-size: 14px; font-weight: 500; }
#listView .track-item .ext { color: var(--text2); font-size: 12px; text-transform: uppercase; flex-shrink: 0; }

/* player bar */
.player-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 20px; z-index: 100; backdrop-filter: blur(12px);
}
.player-inner { max-width: 1100px; margin: 0 auto; }
.player-info { font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text2); }
.player-info strong { color: var(--text); }
.progress-wrap {
    display: flex; align-items: center; gap: 12px;
}
.progress-bar {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px;
    cursor: pointer; position: relative;
}
.progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 2px; width: 0%;
    transition: width .15s linear;
}
.time { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 80px; text-align: right; }
.player-controls {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    flex-wrap: wrap;
}
.player-controls button {
    background: none; border: none; color: var(--text); cursor: pointer;
    font-size: 18px; padding: 4px 6px; border-radius: 4px; transition: all .2s;
    line-height: 1;
}
.player-controls button:hover { color: var(--accent); }
.player-controls button.active-btn { color: var(--accent); }

/* sound controller */
.sound-btn {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 16px; padding: 4px 8px; border-radius: 4px; transition: all .2s;
    margin-left: auto; line-height: 1;
}
.sound-btn:hover { color: var(--text); }
.sound-btn.active { color: var(--accent); }

.sound-panel {
    display: none; margin-top: 8px; padding: 14px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius);
}
.sound-panel.open { display: block; }
.sound-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.sound-row:last-child { margin-bottom: 0; }
.sound-row label {
    font-size: 12px; font-weight: 500; color: var(--text2);
    min-width: 90px; flex-shrink: 0;
}
.sound-row input[type="range"] {
    flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
    background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
.sound-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
}
.sound-row .val {
    font-size: 12px; color: var(--text2); min-width: 40px; text-align: right;
}
.sound-row .toggle-wrap {
    display: flex; align-items: center; gap: 8px;
}
.sound-row .toggle {
    position: relative; width: 40px; height: 22px; background: var(--border);
    border-radius: 11px; cursor: pointer; transition: background .2s;
    border: none; padding: 0;
}
.sound-row .toggle.on { background: var(--accent); }
.sound-row .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 18px; height: 18px; border-radius: 50%; background: #fff;
    transition: transform .2s;
}
.sound-row .toggle.on::after { transform: translateX(18px); }
.sound-row .toggle-label { font-size: 13px; color: var(--text); }

.search-bar { margin-bottom: 20px; }
.search-bar input {
    width: 100%; padding: 10px 16px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    font-size: 14px; outline: none; transition: border .2s;
}
.search-bar input:focus { border-color: var(--accent); }
.search-bar input::placeholder { color: var(--text2); }

.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty p { font-size: 15px; margin-top: 8px; }

@media (max-width: 600px) {
    #gridView .track-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .player-bar { padding: 10px 14px; }
    .sound-row { flex-wrap: wrap; }
    .sound-row label { min-width: 70px; }
}
</style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>♪ <span>Audio</span>Player</h1>
            <div class="stats"><span id="trackCount">0</span> tracks</div>
        </div>
        <div class="view-toggle">
            <button id="gridBtn" class="active" onclick="switchView('grid')">Grid</button>
            <button id="listBtn" onclick="switchView('list')">Playlist</button>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" id="search" placeholder="Search tracks..." oninput="filterTracks()">
    </div>

    <div id="gridView">
        <div class="track-grid" id="trackGrid"></div>
    </div>

    <div id="listView">
        <div class="track-list" id="trackList"></div>
    </div>

    <div class="empty" id="emptyState" style="display:none">
        <p>No audio files found. Add .mp3, .wav, .ogg, .flac, .aac, .m4a, or .wma files to the <code>audio/</code> folder.</p>
    </div>
</div>

<div class="player-bar" id="playerBar" style="display:none">
    <div class="player-inner">
        <div class="player-controls">
            <button onclick="prevTrack()" title="Previous">⏮</button>
            <button onclick="togglePlay()" id="playBtn" title="Play/Pause">▶</button>
            <button onclick="nextTrack()" title="Next">⏭</button>
            <button onclick="toggleShuffle()" id="shuffleBtn" title="Shuffle On">🔀</button>
            <span class="player-info"><strong id="currentName">—</strong></span>
            <button class="sound-btn" id="soundBtn" onclick="toggleSoundPanel()" title="Sound Controller">🔊</button>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="fill" id="progressFill"></div>
            </div>
            <span class="time" id="timeDisplay">0:00 / 0:00</span>
        </div>
        <div class="sound-panel" id="soundPanel">
            <div class="sound-row">
                <label>Volume</label>
                <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
                <span class="val" id="volumeVal">80%</span>
            </div>
            <div class="sound-row">
                <label>Noise Reduction</label>
                <div class="toggle-wrap">
                    <button class="toggle" id="nrToggle" onclick="toggleNR()"></button>
                    <span class="toggle-label" id="nrLabel">Off</span>
                </div>
            </div>
            <div class="sound-row" id="nrControls" style="display:none">
                <label>Low Cut</label>
                <input type="range" id="hpSlider" min="20" max="500" value="80" oninput="setHP(this.value)">
                <span class="val" id="hpVal">80 Hz</span>
            </div>
            <div class="sound-row" id="nrControls2" style="display:none">
                <label>High Cut</label>
                <input type="range" id="lpSlider" min="2000" max="20000" value="14000" oninput="setLP(this.value)">
                <span class="val" id="lpVal">14000 Hz</span>
            </div>
        </div>
    </div>
</div>

<script>
let tracks = [];
let filteredTracks = [];
let currentIndex = -1;
let isPlaying = false;
let shuffle = true;
let currentView = 'grid';
let nrOn = false;

let audioCtx = null;
let audioEl = new Audio();
let source = null;
let gainNode = null;
let highPass = null;
let lowPass = null;

function initAudioGraph() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaElementSource(audioEl);
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.8;
    highPass = audioCtx.createBiquadFilter();
    highPass.type = 'highpass';
    highPass.frequency.value = 20;
    highPass.Q.value = 0.7;
    lowPass = audioCtx.createBiquadFilter();
    lowPass.type = 'lowpass';
    lowPass.frequency.value = 22000;
    lowPass.Q.value = 0.7;
    source.connect(highPass);
    highPass.connect(lowPass);
    lowPass.connect(gainNode);
    gainNode.connect(audioCtx.destination);
}

audioEl.addEventListener('timeupdate', updateProgress);
audioEl.addEventListener('ended', onTrackEnd);
audioEl.addEventListener('loadedmetadata', updateTimeDisplay);

async function loadTracks() {
    try {
        const res = await fetch('list.php');
        tracks = await res.json();
        tracks.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
        filteredTracks = [...tracks];
        render();
        document.getElementById('trackCount').textContent = tracks.length;
        if (tracks.length === 0) {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('gridView').style.display = 'none';
            document.getElementById('listView').style.display = 'none';
        }
    } catch (e) {
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('emptyState').querySelector('p').textContent = 'Could not load tracks.';
    }
}

function filterTracks() {
    const q = document.getElementById('search').value.toLowerCase();
    filteredTracks = tracks.filter(t => t.name.toLowerCase().includes(q));
    render();
}

function render() {
    renderGrid();
    renderList();
}

function renderGrid() {
    const grid = document.getElementById('trackGrid');
    grid.innerHTML = filteredTracks.map((t, i) => {
        const active = tracks.indexOf(t) === currentIndex ? 'playing' : '';
        const num = i + 1;
        return `<div class="track-card ${active}" onclick="playTrack(${tracks.indexOf(t)})">
            <div class="index">${num}</div>
            <div class="name">${escapeHtml(t.name)}</div>
            <div class="ext">${t.ext}</div>
        </div>`;
    }).join('');
}

function renderList() {
    const list = document.getElementById('trackList');
    list.innerHTML = filteredTracks.map((t, i) => {
        const active = tracks.indexOf(t) === currentIndex ? 'playing' : '';
        const icon = tracks.indexOf(t) === currentIndex && isPlaying ? '▶' : '♪';
        const num = i + 1;
        return `<div class="track-item ${active}" onclick="playTrack(${tracks.indexOf(t)})">
            <span class="idx">${num}</span>
            <span class="play-icon">${icon}</span>
            <span class="name">${escapeHtml(t.name)}</span>
            <span class="ext">${t.ext}</span>
        </div>`;
    }).join('');
}

function playTrack(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    if (!audioCtx) initAudioGraph();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentIndex = idx;
    const t = tracks[currentIndex];
    audioEl.src = t.path;
    audioEl.play();
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    document.getElementById('currentName').textContent = t.name;
    document.getElementById('playerBar').style.display = 'block';
    render();
}

function togglePlay() {
    if (currentIndex === -1) {
        if (tracks.length > 0) playTrack(0);
        return;
    }
    if (!audioCtx) initAudioGraph();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (audioEl.paused) {
        audioEl.play();
        isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
    } else {
        audioEl.pause();
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
    }
    render();
}

function nextTrack() {
    if (tracks.length === 0) return;
    let idx;
    if (shuffle) {
        idx = Math.floor(Math.random() * tracks.length);
    } else {
        const currentFiltered = filteredTracks.indexOf(tracks[currentIndex]);
        const nextFiltered = (currentFiltered + 1) % filteredTracks.length;
        idx = tracks.indexOf(filteredTracks[nextFiltered]);
    }
    playTrack(idx);
}

function prevTrack() {
    if (tracks.length === 0) return;
    const currentFiltered = filteredTracks.indexOf(tracks[currentIndex]);
    const prevFiltered = (currentFiltered - 1 + filteredTracks.length) % filteredTracks.length;
    const idx = tracks.indexOf(filteredTracks[prevFiltered]);
    playTrack(idx);
}

function onTrackEnd() { nextTrack(); }

function toggleShuffle() {
    shuffle = !shuffle;
    document.getElementById('shuffleBtn').textContent = shuffle ? '🔀' : '➡';
    document.getElementById('shuffleBtn').classList.toggle('active-btn', shuffle);
    document.getElementById('shuffleBtn').title = shuffle ? 'Shuffle On' : 'Shuffle Off';
}

function updateProgress() {
    if (audioEl.duration) {
        const pct = (audioEl.currentTime / audioEl.duration) * 100;
        document.getElementById('progressFill').style.width = pct + '%';
    }
    updateTimeDisplay();
}

function updateTimeDisplay() {
    const cur = formatTime(audioEl.currentTime);
    const dur = audioEl.duration ? formatTime(audioEl.duration) : '0:00';
    document.getElementById('timeDisplay').textContent = `${cur} / ${dur}`;
}

function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
}

function seek(e) {
    const bar = document.getElementById('progressBar');
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    if (audioEl.duration) {
        audioEl.currentTime = pct * audioEl.duration;
    }
}

function switchView(v) {
    currentView = v;
    document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
    document.getElementById('listBtn').classList.toggle('active', v === 'list');
    document.getElementById('gridView').style.display = v === 'grid' ? 'block' : 'none';
    document.getElementById('listView').style.display = v === 'list' ? 'block' : 'none';
    render();
}

/* sound controller */
function toggleSoundPanel() {
    const panel = document.getElementById('soundPanel');
    const btn = document.getElementById('soundBtn');
    panel.classList.toggle('open');
    btn.classList.toggle('active');
}

function setVolume(val) {
    const v = val / 100;
    if (gainNode) gainNode.gain.value = v;
    document.getElementById('volumeVal').textContent = val + '%';
    document.getElementById('soundBtn').textContent = val == 0 ? '🔇' : val < 50 ? '🔉' : '🔊';
}

function toggleNR() {
    nrOn = !nrOn;
    const toggle = document.getElementById('nrToggle');
    const label = document.getElementById('nrLabel');
    const c1 = document.getElementById('nrControls');
    const c2 = document.getElementById('nrControls2');
    toggle.classList.toggle('on', nrOn);
    label.textContent = nrOn ? 'On' : 'Off';
    c1.style.display = nrOn ? 'flex' : 'none';
    c2.style.display = nrOn ? 'flex' : 'none';
    if (!nrOn) {
        if (highPass) highPass.frequency.value = 20;
        if (lowPass) lowPass.frequency.value = 22000;
    } else {
        if (highPass) highPass.frequency.value = parseFloat(document.getElementById('hpSlider').value);
        if (lowPass) lowPass.frequency.value = parseFloat(document.getElementById('lpSlider').value);
    }
}

function setHP(val) {
    document.getElementById('hpVal').textContent = val + ' Hz';
    if (nrOn && highPass) highPass.frequency.value = parseFloat(val);
}

function setLP(val) {
    document.getElementById('lpVal').textContent = val + ' Hz';
    if (nrOn && lowPass) lowPass.frequency.value = parseFloat(val);
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

document.addEventListener('DOMContentLoaded', loadTracks);
</script>
</body>
</html>
